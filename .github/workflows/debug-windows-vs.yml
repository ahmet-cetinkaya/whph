name: Debug Windows VS Detection

on:
  workflow_dispatch:

jobs:
  debug-vs:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize Submodules
        uses: ./.github/actions/setup-repository

      - name: Setup Flutter with FVM
        uses: ./.github/actions/setup-fvm
        with:
          cache-key-suffix: "windows"

      - name: Check Flutter version
        run: |
          cd src
          fvm flutter --version
          fvm flutter doctor -v

      - name: Check Visual Studio installations
        run: |
          Write-Host "=== All Visual Studio Installations ==="
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -all -format json | ConvertFrom-Json | ForEach-Object {
            Write-Host "`nDisplay Name: $($_.displayName)"
            Write-Host "Installation Version: $($_.installationVersion)"
            Write-Host "Installation Path: $($_.installationPath)"
            Write-Host "Is Complete: $($_.isComplete)"
            Write-Host "Is Launchable: $($_.isLaunchable)"
            Write-Host "Channel Id: $($_.channelId)"
          }

      - name: Check latest VS with required workloads
        run: |
          Write-Host "=== Checking for VS with required workloads ==="
          
          # Check for NativeDesktop workload
          $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Workload.NativeDesktop -format json | ConvertFrom-Json
          if ($vs) {
            Write-Host "✅ Found VS with NativeDesktop workload:"
            Write-Host "  $($vs.displayName)"
            Write-Host "  Version: $($vs.installationVersion)"
          } else {
            Write-Host "❌ No VS with NativeDesktop workload found"
          }

          # Check for VCTools workload
          $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Workload.VCTools -format json | ConvertFrom-Json
          if ($vs) {
            Write-Host "✅ Found VS with VCTools workload:"
            Write-Host "  $($vs.displayName)"
            Write-Host "  Version: $($vs.installationVersion)"
          } else {
            Write-Host "❌ No VS with VCTools workload found"
          }

      - name: Enable Windows desktop and check
        run: |
          cd src
          Write-Host "=== Enabling Windows desktop ==="
          fvm flutter config --enable-windows-desktop

          Write-Host "`n=== Running pub get ==="
          fvm flutter pub get

      - name: Test Flutter VS detection
        run: |
          cd src
          Write-Host "=== Testing Flutter's VS detection ==="
          
          # Run flutter build with verbose to see what it detects
          Write-Host "Running: fvm flutter build windows --release --verbose"
          $output = fvm flutter build windows --release --verbose 2>&1
          
          Write-Host "`n=== Looking for generator info in output ==="
          $output | Select-String -Pattern "Visual Studio|generator|CMAKE" | Select-Object -First 30

      - name: Check CMake availability
        run: |
          Write-Host "=== CMake Check ==="
          
          # Check PATH for cmake
          $cmake = Get-Command cmake -ErrorAction SilentlyContinue
          if ($cmake) {
            Write-Host "✅ CMake found: $($cmake.Source)"
            & cmake --version
          } else {
            Write-Host "❌ CMake not found in PATH"
          }

          # Check VS bundled CMake
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          if ($vsPath) {
            $vsCmake = Join-Path $vsPath "Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe"
            if (Test-Path $vsCmake) {
              Write-Host "✅ VS CMake found: $vsCmake"
              & $vsCmake --version
            }
          }

      - name: Try manual CMake generation
        run: |
          cd src
          Write-Host "=== Manual CMake test ==="
          
          # Enable Windows desktop first
          fvm flutter config --enable-windows-desktop
          fvm flutter pub get
          
          # Try with explicit generator
          Write-Host "Trying: cmake -S windows -B build/windows -G 'Visual Studio 17 2022' -A x64"
          cmake -S windows -B build/windows -G "Visual Studio 17 2022" -A x64 2>&1 | Select-Object -First 50
