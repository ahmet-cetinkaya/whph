name: Flutter CI - Android

on:
  workflow_dispatch: # This is a trigger for manual workflow run
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Initialize acore submodule
      run: |
        git submodule update --init --recursive lib/corePackages/acore

    # Install dependencies
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # Flutter setup and dependencies
    - name: Get Flutter dependencies
      run: flutter pub get
    
    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
    
    - name: Create local.properties
      run: |
        # Get Flutter SDK path
        FLUTTER_ROOT=$(flutter --version --verbose 2>/dev/null | grep "Flutter" | head -1 | grep -o '/[^ ]*flutter' | head -1)
        if [ -z "$FLUTTER_ROOT" ]; then
          FLUTTER_ROOT=$(which flutter | sed 's|/bin/flutter||')
        fi
        if [ -z "$FLUTTER_ROOT" ]; then
          echo "Warning: Could not determine Flutter SDK path, using default"
          FLUTTER_ROOT="/opt/hostedtoolcache/flutter/stable-3.32.0-x64"
        fi
        
        # Get Android SDK path
        ANDROID_HOME=${ANDROID_SDK_ROOT:-${ANDROID_HOME:-"/usr/local/lib/android/sdk"}}
        
        # Create local.properties
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
        echo "flutter.buildMode=release" >> android/local.properties
        
        echo "Created local.properties:"
        cat android/local.properties
        
        # Verify paths exist
        if [ ! -d "$ANDROID_HOME" ]; then
          echo "Warning: Android SDK path does not exist: $ANDROID_HOME"
        fi
        if [ ! -d "$FLUTTER_ROOT" ]; then
          echo "Warning: Flutter SDK path does not exist: $FLUTTER_ROOT"
        fi
    
    # Build for Android
    - name: Install RPS globally
      run: dart pub global activate rps

    - name: Build for Android (Reproducible)
      run: rps release:android:reproducible
    
    - name: Verify and Display Build Output
      run: |
        APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
        echo "=== Android Build Output Verification ==="
        
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK file exists: $APK_PATH"
          
          # Get file size
          FILE_SIZE=$(stat -c%s "$APK_PATH")
          FILE_SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $FILE_SIZE / 1024 / 1024}")
          echo "📦 File size: $FILE_SIZE bytes ($FILE_SIZE_MB MB)"
          
          # Calculate SHA256
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "🔐 SHA256: $SHA256"
          
          # Get file modification time
          MODIFIED=$(stat -c%y "$APK_PATH")
          echo "⏰ Modified: $MODIFIED"
          
          echo "=== Build Output Summary ==="
          echo "Path: $APK_PATH"
          echo "Size: $FILE_SIZE_MB MB"
          echo "Hash: $SHA256"
        else
          echo "❌ ERROR: APK file not found at $APK_PATH"
          echo "Build directory contents:"
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          exit 1
        fi
    
    # Publish the build artifacts
    - name: Get application version
      id: app_version
      run: |
        APP_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml | cut -d'+' -f1)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT
        echo "✅ Set APP_VERSION=$APP_VERSION"

    - name: Upload Android build artifact
      uses: actions/upload-artifact@v4
      with:
        name: whph-v${{ steps.app_version.outputs.APP_VERSION }}-android
        path: build/app/outputs/flutter-apk/app-release.apk
