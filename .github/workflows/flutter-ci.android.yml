name: Flutter CI - Android

on:
  workflow_dispatch: # This is a trigger for manual workflow run
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Initialize acore submodule
      run: |
        git submodule update --init --recursive lib/corePackages/acore

    # Install dependencies
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # Flutter setup and dependencies
    - name: Get Flutter dependencies and verify installation
      run: |
        # Install Flutter dependencies
        flutter pub get
        
        # Verify pubspec.lock exists
        if [ ! -f "pubspec.lock" ]; then
          echo "❌ ERROR: pubspec.lock not found after flutter pub get"
          exit 1
        fi
        
        echo "✅ Flutter dependencies installed successfully"
        
        # Show Flutter and Dart versions
        flutter --version
        dart --version
        
        # Run Flutter doctor for diagnostics
        flutter doctor -v
    
    - name: Create local.properties
      run: |
        echo "=== Flutter SDK Detection ==="
        
        # Debug: Show flutter installation info
        which flutter
        flutter --version
        
        # Get Flutter SDK path using flutter config
        FLUTTER_ROOT=$(flutter config | grep "flutter-root" | cut -d'=' -f2 | tr -d ' ')
        echo "Flutter config result: '$FLUTTER_ROOT'"
        
        if [ -z "$FLUTTER_ROOT" ]; then
          # Fallback: Get from which flutter and remove bin/flutter
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          echo "Fallback method result: '$FLUTTER_ROOT'"
        fi
        
        if [ -z "$FLUTTER_ROOT" ]; then
          echo "Warning: Could not determine Flutter SDK path, using default"
          FLUTTER_ROOT="/opt/hostedtoolcache/flutter/stable-3.32.0-x64"
        fi
        
        echo "Final Flutter SDK path: $FLUTTER_ROOT"
        
        # Get Android SDK path
        ANDROID_HOME=${ANDROID_SDK_ROOT:-${ANDROID_HOME:-"/usr/local/lib/android/sdk"}}
        echo "Android SDK path: $ANDROID_HOME"
        
        # Create local.properties
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
        echo "flutter.buildMode=release" >> android/local.properties
        
        echo "Created local.properties:"
        cat android/local.properties
        
        # Verify paths exist
        if [ ! -d "$ANDROID_HOME" ]; then
          echo "Warning: Android SDK path does not exist: $ANDROID_HOME"
        else
          echo "✅ Android SDK path exists: $ANDROID_HOME"
        fi
        
        if [ ! -d "$FLUTTER_ROOT" ]; then
          echo "Warning: Flutter SDK path does not exist: $FLUTTER_ROOT"
        else
          echo "✅ Flutter SDK path exists: $FLUTTER_ROOT"
        fi
        
        # Verify Flutter tools gradle exists
        FLUTTER_TOOLS_GRADLE="$FLUTTER_ROOT/packages/flutter_tools/gradle"
        if [ ! -d "$FLUTTER_TOOLS_GRADLE" ]; then
          echo "Error: Flutter tools gradle not found at: $FLUTTER_TOOLS_GRADLE"
          echo "Available paths in Flutter SDK:"
          find "$FLUTTER_ROOT" -name "gradle" -type d 2>/dev/null || echo "No gradle directories found"
          echo "Flutter SDK directory structure:"
          ls -la "$FLUTTER_ROOT/" 2>/dev/null || echo "Cannot list Flutter SDK directory"
          exit 1
        else
          echo "✅ Flutter tools gradle found at: $FLUTTER_TOOLS_GRADLE"
        fi
    
    # Build for Android
    - name: Install RPS globally
      run: dart pub global activate rps

    - name: Prepare Flutter project for build
      run: |
        # Clean any previous builds
        flutter clean
        
        # Verify Flutter project structure
        flutter pub deps --style=tree | head -20
        
        echo "✅ Flutter project prepared for build"

    - name: Analyze Build Environment
      run: |
        # Run build environment analysis
        bash scripts/analyze_build_environment.sh > build_env_ci.txt
        
        echo "=== CI Build Environment Analysis ==="
        cat build_env_ci.txt
        
        echo ""
        echo "💡 Compare this output with local environment using:"
        echo "   bash scripts/analyze_build_environment.sh"

    - name: Build for Android (Reproducible)
      env:
        # Set reproducible build environment variables
        SOURCE_DATE_EPOCH: 1751892913
        TZ: UTC
        LC_ALL: C
        LANG: C
        # Use project's gradle wrapper, not system gradle
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"
      run: |
        echo "🔧 Setting up reproducible build environment in CI..."
        echo "SOURCE_DATE_EPOCH: $SOURCE_DATE_EPOCH"
        echo "TZ: $TZ"
        echo "LC_ALL: $LC_ALL"
        echo "LANG: $LANG"
        echo ""
        
        # Ensure we use the project's gradle wrapper
        echo "🔍 Gradle wrapper check:"
        ls -la android/gradlew
        echo "Gradle wrapper version:"
        ./android/gradlew --version
        echo ""
        
        # Run reproducible build
        rps release:android:reproducible
    
    - name: Verify and Display Build Output
      run: |
        APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
        echo "=== Android Build Output Verification ==="
        
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK file exists: $APK_PATH"
          
          # Get file size
          FILE_SIZE=$(stat -c%s "$APK_PATH")
          FILE_SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $FILE_SIZE / 1024 / 1024}")
          echo "📦 File size: $FILE_SIZE bytes ($FILE_SIZE_MB MB)"
          
          # Calculate SHA256
          SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "🔐 SHA256: $SHA256"
          
          # Get file modification time
          MODIFIED=$(stat -c%y "$APK_PATH")
          echo "⏰ Modified: $MODIFIED"
          
          echo "=== Build Output Summary ==="
          echo "Path: $APK_PATH"
          echo "Size: $FILE_SIZE_MB MB"
          echo "Hash: $SHA256"
        else
          echo "❌ ERROR: APK file not found at $APK_PATH"
          echo "Build directory contents:"
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          exit 1
        fi
    
    # Publish the build artifacts
    - name: Get application version
      id: app_version
      run: |
        APP_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml | cut -d'+' -f1)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT
        echo "✅ Set APP_VERSION=$APP_VERSION"

    - name: Upload Android build artifact
      uses: actions/upload-artifact@v4
      with:
        name: whph-v${{ steps.app_version.outputs.APP_VERSION }}-android
        path: build/app/outputs/flutter-apk/app-release.apk
