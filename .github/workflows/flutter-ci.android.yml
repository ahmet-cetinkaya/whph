name: Flutter CI - Android

on:
  workflow_dispatch: # This is a trigger for manual workflow run
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Initialize acore submodule
      run: |
        git submodule update --init lib/corePackages/acore

    # Install dependencies
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # Build for Android
    - name: Setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/whph-release.keystore

    - name: Update Gradle Properties
      run: |
        cat << EOF > android/key.properties
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=whph-release.keystore
        EOF

    - name: Setup Build Environment
      run: |
        flutter config --no-analytics
        export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
        echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" >> $GITHUB_ENV
        echo "FLUTTER_STORAGE_BASE_URL=https://storage.googleapis.com" >> $GITHUB_ENV
        echo "DART_OBFUSCATION=true" >> $GITHUB_ENV

    - name: Clean Build Environment
      run: flutter clean

    - name: Get Dependencies
      run: flutter pub get

    - name: Security Validation
      run: bash scripts/security_validation.sh --ci

    - name: Build for Android
      run: |
        export SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
        export FLUTTER_STORAGE_BASE_URL=${{ env.FLUTTER_STORAGE_BASE_URL }}
        export DART_OBFUSCATION=${{ env.DART_OBFUSCATION }}
        flutter build apk --release --split-debug-info=build/app/outputs/symbols --obfuscate --tree-shake-icons --dart-define=FLUTTER_WEB_USE_SKIA=true --target-platform=android-arm64,android-arm,android-x64
    
    # Publish the build artifacts
    - name: Get application version
      id: app_version
      run: |
        APP_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml)
        echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

    - name: Upload Android build artifact
      uses: actions/upload-artifact@v4
      with:
        name: whph-v${{ env.APP_VERSION }}-android
        path: build/app/outputs/flutter-apk/app-release.apk
