name: "Get Application Version"
description: "Extracts application version from pubspec.yaml"
outputs:
  version:
    description: "The application version"
    value: ${{ steps.extract-version-unix.outputs.version || steps.extract-version-windows.outputs.version }}
  version-number:
    description: "The version number without build number"
    value: ${{ steps.extract-version-unix.outputs.version-number || steps.extract-version-windows.outputs.version-number }}
  build-number:
    description: "The build number"
    value: ${{ steps.extract-version-unix.outputs.build-number || steps.extract-version-windows.outputs.build-number }}

runs:
  using: "composite"
  steps:
    - name: Extract version from pubspec.yaml (Unix)
      id: extract-version-unix
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "Extracting version from pubspec.yaml..."

        # Get full version (e.g., "0.11.1+49")
        FULL_VERSION=$(awk '/^version:/ {print $2}' src/pubspec.yaml)
        echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "Full version: $FULL_VERSION"

        # Split version and build number
        VERSION_NUMBER=$(echo "$FULL_VERSION" | cut -d'+' -f1)
        BUILD_NUMBER=$(echo "$FULL_VERSION" | cut -d'+' -f2)

        echo "version-number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
        echo "build-number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

        echo "Version number: $VERSION_NUMBER"
        echo "Build number: $BUILD_NUMBER"

        # Set environment variables for backward compatibility
        echo "APP_VERSION=$FULL_VERSION" >> $GITHUB_ENV

    - name: Extract version from pubspec.yaml (Windows)
      id: extract-version-windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "Extracting version from pubspec.yaml..."

        # Get full version (e.g., "0.11.1+49")
        $pubspecContent = Get-Content "src/pubspec.yaml" -Raw
        if ($pubspecContent -match 'version:\s*([\d.]+\+\d+)') {
          $FULL_VERSION = $matches[1]
          echo "version=$FULL_VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Full version: $FULL_VERSION"

          # Split version and build number
          $VERSION_NUMBER, $BUILD_NUMBER = $FULL_VERSION -split '\+'

          echo "version-number=$VERSION_NUMBER" >> $env:GITHUB_OUTPUT
          echo "build-number=$BUILD_NUMBER" >> $env:GITHUB_OUTPUT

          Write-Host "Version number: $VERSION_NUMBER"
          Write-Host "Build number: $BUILD_NUMBER"

          # Set environment variables for backward compatibility
          echo "APP_VERSION=$FULL_VERSION" >> $env:GITHUB_ENV
        } else {
          Write-Host "❌ Failed to extract version from pubspec.yaml"
          exit 1
        }
