  help:
    details:
      content:
        "Ovládajte upravljanje nalog in maksimizirajte produktivnost z učinkovitim\
        \ organiziranjem, prioritetiziranjem in sledenjem vašemu delu.\n\n## ⚡ Zakaj\
        \ Je Pomembno?\n\nUčinkovito upravljanje nalog je osnova produktivnosti. Pravilno\
        \ strukturirane naloge z jasnimi prioritetami in roki vam pomagajo osredotočiti\
        \ se na tisto, kar je najbolj pomembno, in preprečijo, da bi pomembno delo\
        \ padlo skozi razpoke.\n\n## \U0001F4DD Organizacija Nalog\n\nStrukturirajte\
        \ svoje naloge z obsežnimi podrobnostmi za ohranjanje jasnosti in fokusa.\
        \ Uporabite oznake, prioritet in ocene časa za ustvarjanje sistematičnega\
        \ pristopa k vaši obremenitvi.\n\n- \U0001F3F7️ Kategorizirajte naloge z smiselnih\
        \ oznak\n- ⚖️ Nastavite prioritet z uporabo preverjenih okvirov\n- ⏱️ Oceni\
        \ zahteve po času natančno\n- \U0001F4C5 Načrtujte realistične roke in urnike\n\
        \n## ⏰ Upravljanje Časa\n\nSledite svojim naložbam časa za razumevanje vaših\
        \ vzorcev dela in izboljšanje učinkovitosti. Pravilno upravljanje časa pretvori\
        \ razpršene napore v osredotočeno produktivnost.\n\n- \U0001F4CA Spremljajte\
        \ dejanski vs ocenjeni čas\n- \U0001F3AF Osredotočite se na dejavnosti z visokim\
        \ vplivom\n- \U0001F4C8 Analizirajte vzorce produktivnosti sčasoma\n- ⏳ Uravnotežite\
        \ nujne in pomembne naloge\n\n## \U0001F4CA Okvir Prioritete (Matrica Eisenhower)\n\
        \nOrganizirajte svoje naloge z uporabo te preverjene metode prioritetiziranja\
        \ za zagotovitev, da vedno delate na pravih stvareh ob pravem času.\n\n- \U0001F525\
        \ **Nujno & Pomembno:** Obravnavajte takoj - upravljanje kriz in roki\n- \U0001F4C8\
        \ **Pomembno, Ni Nujno:** Načrtujte strateško - načrtovanje in razvoj veščin\
        \  \n- ⚡ **Nujno, Ni Pomembno:** Delegirajte kadar je mogoče - prekinite in\
        \ nekatere sestanke\n- \U0001F5D1️ **Niti Nujno niti Pomembno:** Odstranite\
        \ - zapravljalci časa in dejavnosti nizke vrednosti\n"
      title: Upravljanje Nalog & Vodnik Produktivnosti
    overview:
      content:
        "Transformirajte svojo produktivnost s sistematičnim upravljanjem nalog,
        ki vam pomaga ostati organiziran, osredotočen in v nadzoru vaše obremenitve.


        ## ⚡ Zakaj Je Pomembno?


        Učinkovito upravljanje nalog je temelj osebnega in strokovnega uspeha. Z organiziranjem
        dela sistematično zmanjšate stres, spoštujete roke dosledno in ustvarite prostor
        za pomenljiv napredek pri pomembnih ciljih.


        ## 📋 Organizacija Nalog


        Ustvarite strukturiran pristop k upravljanju odgovornosti. Dobro organizirane
        naloge vodijo do jasnih prioritet in učinkovite izvedbe dnevnega dela.


        - ✅ Ustvarite in kategorizirajte naloge sistematično

        - 🏷️ Združite povezano delo z smiselnih oznak

        - ⚖️ Nastavite jasne prioritet in roke

        - 🔍 Uporabite filtre in iskanje za hiter dostop


        ## ⏱️ Sledenje Času & Fokus


        Spremljajte naložbe časa za razumevanje vzorcev produktivnosti in optimizacijo
        delovnega toka. Zavedanje časa vodi do boljšega načrtovanja in izboljšanega
        izvajanja.


        - ⏰ Spremljajte dejanski čas porabljen na nalogo

        - 🎯 Uporabite Način Maraton za osredotočene delovne seje

        - 📊 Analizirajte vzorce zaključka in trende

        - 🔄 Preglejte in prilagodite ocene časa redno


        ## 📈 Spremljanje Napredka


        Vodite evidenco dosežkov in se učite iz vzorcev dela. Redno pregledovanje
        in refleksija poganjajo kontinuirano izboljšanje vašega sistema produktivnosti.


        - 📈 Spremljajte stopnje zaključka nalog

        - 📅 Preglejte dnevni in tedenski napredek

        - 🎯 Prepoznajte ozke grli in priložnosti optimizacije

        - 🏆 Proslavite dosežke in zaključke mejnikov

        "
      title: Upravljanje Nalog & Vodnik Delovnega Tok
  marathon:
    details:
      title: Podrobnosti Naloge
    help:
      content:
        "Maksimizirajte fokus in produktivnost z strukturiranimi delovnimi\
        \ sejami, ki vam pomagajo ohraniti globoko koncentracijo, medtem ko preprečujejo\
        \ izgorelost.\n\n## ⚡ Zakaj Je Pomembno?\n\nOsredotočene delovne seje so bistvene\
        \ za globoko delo in visokokakovostni izhod. Z delom v strukturiranih intervalih\
        \ z rednimi odmori ohranjate vrhunsko mentalno zmogljivost, medtem ko izogibate\
        \ utrujenosti od podaljšanih, neosredotočenih obdobij dela.\n\n## ⏰ Časovno\
        \ Omejene Seje Fokus\n\nUporabite preverjene tehnike upravljanja časa za strukturiranje\
        \ dela za maksimalno učinkovitost. Strukturirane seje vam pomagajo ohraniti\
        \ koncentracijo in dokončati naloge učinkoviteje.\n\n- \U0001F3AF **Klasik\
        \ Fokus:** 25 minut dela / 5 minut odmora\n- \U0001F4C8 **Razširjen Fokus:**\
        \ 50 minut dela / 10 minut odmora  \n- \U0001F504 **Dolg Odmor:** 15-30 minut\
        \ po 4 sejah\n- ⚖️ **Prilagojen Časovnik:** Prilagodite intervale vašemu naravnemu\
        \ ritmu\n\n## \U0001F9E0 Kognitivne Prednosti\n\nStrukturirane delovne seje\
        \ izkoriščajo naravne cikle pozornosti vašega možgan za optimizacijo zmogljivosti\
        \ in preprečevanje mentalne utrujenosti, ki zmanjšuje kakovost in ustvarjalnost.\n\
        \n- \U0001F3AF Izboljšan fokus in globoka koncentracija\n- \U0001F50B Zmanjšana\
        \ mentalna utrujenost in izgorelost\n- \U0001F4AA Trajna motivacija skozi\
        \ redne dosežke\n- ⚡ Izboljšano zavedanje časa in natančnost načrtovanja\n\
        \n## \U0001F4CA Optimizacija Zmogljivosti\n\nSledite vzorcem osredotočenega\
        \ dela za razumevanje vaših vrhunskih časov produktivnosti in optimizacijo\
        \ urnika za maksimalno učinkovitost.\n\n- \U0001F3F7️ Kategorizirajte seje\
        \ fokus z oznakami za analizo\n- \U0001F4C8 Spremljajte vzorce produktivnosti\
        \ čez različne čase\n- \U0001F6AB Odstranite motnje pred začetkom sej\n- \U0001F6B6\
        \ Uporabite odmore za fizično gibanje in mentalni reset\n"
      title: Osredotočene Delovne Seje & Vodnik Upravljanja Časa
      tooltip: Tooltip pomoči Maraton
    label: Način Maraton
    unpin_task_tooltip: Odpri najnižjo trenutno nalogo
