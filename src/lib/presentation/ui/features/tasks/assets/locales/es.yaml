      este formato:


      - **Columna 1**: Título (Requerido)

      - **Columna 2**: Descripción (Opcional)

      - **Columna 3**: Prioridad (0-3, Opcional)

      - **Columna 4**: Fecha planificada (YYYY-MM-DD, Opcional)

      - **Columna 5**: Fecha límite (YYYY-MM-DD, Opcional)

      - **Columna 6**: Etiquetas (Opcional, separadas por comas)

      Nota: La primera fila se trata como encabezado y se omitirá."
    todoist_info_title: Exportar CSV de Todoist
    todoist_info_description: "Exporta tu proyecto como un archivo CSV:



      1. Inicia sesión en Todoist en https://todoist.com


      2. Abre un proyecto existente


      3. Haz clic en el icono de tres puntos en la esquina superior derecha


      4. Selecciona **Exportar como CSV**"
