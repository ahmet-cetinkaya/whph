  help:
    details:
      content:
        "Domine o gerenciamento de tarefas e maximize a produtividade organizando,\
        \ priorizando e rastreando seu trabalho de forma eficaz.\n\n## ⚡ Por Que É\
        \ Importante?\n\nO gerenciamento de tarefas eficaz é a base da produtividade.\
        \ Tarefas estruturadas corretamente com prioridades e prazos claros ajudam\
        \ você a focar no que mais importa e impedem que trabalho importante caia\
        \ no esquecimento.\n\n## \U0001F4DD Organização de Tarefas\n\nEstruture suas\
        \ tarefas com detalhes abrangentes para manter clareza e foco. Use tags, prioridades\
        \ e estimativas de tempo para criar uma abordagem sistemática à sua carga\
        \ de trabalho.\n\n- \U0001F3F7️ Categorize tarefas com tags significativas\n\
        - ⚖️ Defina prioridades usando frameworks comprovados\n- ⏱️ Estime requisitos\
        \ de tempo com precisão\n- \U0001F4C5 Planeje prazos e cronogramas realistas\n\
        \n## ⏰ Gerenciamento de Tempo\n\nRastreie seus investimentos de tempo para\
        \ entender padrões de trabalho e melhorar a eficiência. O gerenciamento de\
        \ tempo adequado transforma esforços dispersos em produtividade focada.\n\n\
        - \U0001F4CA Monitore tempo real vs estimado\n- \U0001F3AF Foque em atividades\
        \ de alto impacto\n- \U0001F4C8 Analise padrões de produtividade ao longo\
        \ do tempo\n- ⏳ Equilibre tarefas urgentes e importantes\n\n## \U0001F4CA\
        \ Framework de Prioridade (Matriz de Eisenhower)\n\nOrganize suas tarefas\
        \ usando este método de priorização comprovado para garantir que você sempre\
        \ trabalhe nas coisas certas no momento certo.\n\n- \U0001F525 **Urgente &\
        \ Importante:** Lide imediatamente - gerenciamento de crises e prazos\n- \U0001F4C8\
        \ **Importante, Não Urgente:** Agende estrategicamente - planejamento e desenvolvimento\
        \ de habilidades  \n- ⚡ **Urgente, Não Importante:** Delegue quando possível\
        \ - interrupções e algumas reuniões\n- \U0001F5D1️ **Nem Urgente nem Importante:**\
        \ Elimine - desperdiçadores de tempo e atividades de baixo valor\n"
      title: Gerenciamento de Tarefas & Guia de Produtividade
    overview:
      content:
        "Transforme sua produtividade com gerenciamento de tarefas sistemático
        que ajuda a manter-se organizado, focado e no controle da sua carga de trabalho.


        ## ⚡ Por Que É Importante?


        O gerenciamento de tarefas eficaz é a pedra angular do sucesso pessoal e profissional.
        Ao organizar seu trabalho de forma sistemática, você reduz o estresse, cumpre
        prazos consistentemente e cria espaço para progresso significativo em metas
        importantes.


        ## 📋 Organização de Tarefas


        Crie uma abordagem estruturada para gerenciar suas responsabilidades. Tarefas
        bem organizadas levam a prioridades claras e execução eficiente do trabalho
        diário.


        - ✅ Crie e categorize tarefas sistematicamente

        - 🏷️ Agrupe trabalho relacionado com tags significativas

        - ⚖️ Defina prioridades e prazos claros

        - 🔍 Use filtros e pesquisa para acesso rápido


        ## ⏱️ Rastreamento de Tempo & Foco


        Monitore seus investimentos de tempo para entender padrões de produtividade
        e otimizar seu fluxo de trabalho. A conscientização do tempo leva a um planejamento
        melhor e desempenho aprimorado.


        - ⏰ Rastreie tempo real gasto por tarefa

        - 🎯 Use Modo Maratona para sessões de trabalho focadas

        - 📊 Analise padrões de conclusão e tendências

        - 🔄 Revise e ajuste estimativas de tempo regularmente


        ## 📈 Monitoramento de Progresso


        Mantenha o controle de suas conquistas e aprenda com seus padrões de trabalho.
        Revisão e reflexão regulares impulsionam melhoria contínua no seu sistema
        de produtividade.


        - 📈 Monitore taxas de conclusão de tarefas

        - 📅 Revise progresso diário e semanal

        - 🎯 Identifique gargalos e oportunidades de otimização

        - 🏆 Celebre conquistas e conclusão de marcos

        "
      title: Gerenciamento de Tarefas & Guia de Fluxo de Trabalho
  marathon:
    details:
      title: Detalhes da Tarefa
    help:
      content:
        "Maximize seu foco e produtividade com sessões de trabalho estruturadas\
        \ que ajudam a manter concentração profunda enquanto previnem o burnout.\n\
        \n## ⚡ Por Que É Importante?\n\nSessões de trabalho focadas são essenciais\
        \ para trabalho profundo e saída de alta qualidade. Ao trabalhar em intervalos\
        \ estruturados com pausas regulares, você mantém o desempenho mental de pico\
        \ enquanto evita a fadiga de períodos de trabalho prolongados e não focados.\n\
        \n## ⏰ Sessões de Foco Limitadas no Tempo\n\nUse técnicas comprovadas de gerenciamento\
        \ de tempo para estruturar seu trabalho para máxima eficiência. Sessões estruturadas\
        \ ajudam a manter a concentração e completar tarefas mais efetivamente.\n\n\
        - \U0001F3AF **Foco Clássico:** 25 minutos de trabalho / 5 minutos de pausa\n\
        - \U0001F4C8 **Foco Estendido:** 50 minutos de trabalho / 10 minutos de pausa\
        \  \n- \U0001F504 **Pausa Longa:** 15-30 minutos após 4 sessões\n- ⚖️ **Tempo\
        \ Personalizado:** Ajuste intervalos para combinar com seu ritmo natural\n\
        \n## \U0001F9E0 Benefícios Cognitivos\n\nSessões de trabalho estruturadas\
        \ aproveitam os ciclos naturais de atenção do seu cérebro para otimizar o\
        \ desempenho e prevenir fadiga mental que reduz qualidade e criatividade.\n\
        \n- \U0001F3AF Foco aprimorado e concentração profunda\n- \U0001F50B Fadiga\
        \ mental reduzida e burnout\n- \U0001F4AA Motivação sustentada através de\
        \ conquistas regulares\n- ⚡ Conscientização de tempo aprimorada e precisão\
        \ de planejamento\n\n## \U0001F4CA Otimização de Desempenho\n\nRastreie seus\
        \ padrões de trabalho focado para entender seus horários de pico de produtividade\
        \ e otimize seu cronograma para máxima efetividade.\n\n- \U0001F3F7️ Categorize\
        \ sessões de foco com tags para análise\n- \U0001F4C8 Monitore padrões de\
        \ produtividade em diferentes horários\n- \U0001F6AB Elimine distrações antes\
        \ de iniciar sessões\n- \U0001F6B6 Use pausas para movimento físico e reset\
        \ mental\n"
      title: Sessões de Trabalho Focadas & Guia de Gerenciamento de Tempo
      tooltip: Tooltip de ajuda do Maratona
    label: Modo Maratona
