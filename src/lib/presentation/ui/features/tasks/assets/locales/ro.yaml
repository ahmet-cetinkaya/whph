  help:
    details:
      content:
        "Stăpânește gestionarea sarcinilor și maximizează productivitatea organizând,\
        \ prioritizând și urmărind munca ta eficient.\n\n## ⚡ De Ce Este Important?\n\
        \nGestionarea eficientă a sarcinilor este baza productivității. Sarcini structurate\
        \ corect cu priorități și termene clare te ajută să te concentrezi pe ceea\
        \ ce contează cel mai mult și previne ca munca importantă să cadă prin crăpături.\n\
        \n## \U0001F4DD Organizare Sarcini\n\nStructurează sarcinile tale cu detalii\
        \ cuprinzătoare pentru a menține claritatea și focusul. Folosește etichete,\
        \ priorități și estimări de timp pentru a crea o abordare sistematică a sarcinilor\
        \ tale.\n\n- \U0001F3F7️ Categorizează sarcinile cu etichete semnificative\n\
        - ⚖️ Setează priorități folosind cadre dovedite\n- ⏱️ Estimează cerințele\
        \ de timp cu acuratețe\n- \U0001F4C5 Planifică termene și programe realiste\n\
        \n## ⏰ Gestionare Timp\n\nUrmărește investițiile tale de timp pentru a înțelege\
        \ modelele tale de muncă și a îmbunătăți eficiența. Gestionarea timpului corect\
        \ transformă eforturile dispersate în productivitate focalizată.\n\n- \U0001F4CA\
        \ Monitorizează timpul real vs estimat\n- \U0001F3AF Concentrează-te pe activități\
        \ cu impact ridicat\n- \U0001F4C8 Analizează modelele de productivitate în\
        \ timp\n- ⏳ Echilibrează sarcinile urgente și importante\n\n## \U0001F4CA\
        \ Cadru de Prioritate (Matrița Eisenhower)\n\nOrganizează sarcinile tale folosind\
        \ această metodă de prioritizare dovedită pentru a te asigura că lucrezi întotdeauna\
        \ la lucrurile potrivite la momentul potrivit.\n\n- \U0001F525 **Urgentă &\
        \ Importantă:** Gestionează imediat - gestionarea crizelor și termenele\n\
        - \U0001F4C8 **Importantă, Nu Urgentă:** Planifică strategic - planificare\
        \ și dezvoltare de abilități  \n- ⚡ **Urgentă, Nu Importantă:** Delegă când\
        \ este posibil - întreruperi și unele întâlniri\n- \U0001F5D1️ **Nici Urgentă\
        \ nici Importantă:** Elimină - risipitori de timp și activități de valoare\
        \ scăzută\n"
      title: Gestionare Sarcini & Ghid de Productivitate
    overview:
      content:
        "Transformă productivitatea ta cu gestionare sistematică a sarcinilor
        care te ajută să rămâi organizat, focalizat și în control al sarcinilor tale.


        ## ⚡ De Ce Este Important?


        Gestionarea eficientă a sarcinilor este piatra de temelie a succesului personal
        și profesional. Prin organizarea muncii tale sistematic, reduci stresul, respecți
        termenele constant și creezi spațiu pentru progres semnificativ în obiective
        importante.


        ## 📋 Organizare Sarcini


        Creează o abordare structurată pentru gestionarea responsabilităților tale.
        Sarcini bine organizate duc la priorități clare și execuție eficientă a muncii
        zilnice.


        - ✅ Creează și categorizează sarcinile sistematic

        - 🏷️ Grupează munca legată cu etichete semnificative

        - ⚖️ Setează priorități și termene clare

        - 🔍 Folosește filtre și căutare pentru acces rapid


        ## ⏱️ Urmărire Timp & Fokus


        Monitorizează investițiile tale de timp pentru a înțelege modelele de productivitate
        și a optimiza fluxul tău de muncă. Conștientizarea timpului duce la planificare
        mai bună și performanță îmbunătățită.


        - ⏰ Urmărește timpul real petrecut pe sarcină

        - 🎯 Folosește Modul Maraton pentru sesiuni de muncă focalizate

        - 📊 Analizează modelele de finalizare și tendințe

        - 🔄 Revizuiește și ajustează estimările de timp regulat


        ## 📈 Monitorizare Progres


        Ține evidența realizărilor tale și învață din modelele tale de muncă. Revizuirea
        și reflecția regulată impulsionează îmbunătățirea continuă a sistemului tău
        de productivitate.


        - 📈 Monitorizează ratele de finalizare a sarcinilor

        - 📅 Revizuiește progresul zilnic și săptămânal

        - 🎯 Identifică blocaje și oportunități de optimizare

        - 🏆 Sărbătorește realizări și finalizări de etape

        "
      title: Gestionare Sarcini & Ghid de Flux de Muncă
  marathon:
    details:
      title: Detalii Sarcină
    help:
      content:
        "Maximizează focusul și productivitatea ta cu sesiuni de muncă structurate\
        \ care te ajută să menții concentrare profundă prevenind epuizarea.\n\n##\
        \ ⚡ De Ce Este Important?\n\nSesiunile de muncă focalizate sunt esențiale\
        \ pentru muncă profundă și ieșire de înaltă calitate. Prin lucrul în intervale\
        \ structurate cu pauze regulate, menții performanța mentală de vârf evitând\
        \ oboseala din perioade prelungite de muncă nefocalizată.\n\n## ⏰ Sesiuni\
        \ de Fokus Limitate în Timp\n\nFolosește tehnici dovedite de gestionare a\
        \ timpului pentru a structura munca ta pentru eficiență maximă. Sesiunile\
        \ structurate te ajută să menții concentrarea și să finalizezi sarcinile mai\
        \ eficient.\n\n- \U0001F3AF **Fokus Clasic:** 25 minute muncă / 5 minute pauză\n\
        - \U0001F4C8 **Fokus Extins:** 50 minute muncă / 10 minute pauză  \n- \U0001F504\
        \ **Pauză Lungă:** 15-30 minute după 4 sesiuni\n- ⚖️ **Timing Personalizat:**\
        \ Ajustează intervalele pentru a se potrivi ritmului tău natural\n\n## \U0001F9E0\
        \ Beneficii Cognitive\n\nSesiunile de muncă structurate exploatează ciclurile\
        \ naturale de atenție ale creierului tău pentru a optimiza performanța și\
        \ a preveni oboseala mentală care reduce calitatea și creativitatea.\n\n-\
        \ \U0001F3AF Fokus îmbunătățit și concentrare profundă\n- \U0001F50B Oboseală\
        \ mentală redusă și epuizare\n- \U0001F4AA Motivație susținută prin realizări\
        \ regulate\n- ⚡ Conștientizare a timpului îmbunătățită și precizie de planificare\n\
        \n## \U0001F4CA Optimizare Performanță\n\nUrmărește modelele tale de muncă\
        \ focalizată pentru a înțelege orele tale de vârf de productivitate și a optimiza\
        \ programul tău pentru eficiență maximă.\n\n- \U0001F3F7️ Categorizează sesiunile\
        \ de fokus cu etichete pentru analiză\n- \U0001F4C8 Monitorizează modelele\
        \ de productivitate în diferite ore\n- \U0001F6AB Elimină distracțiile înainte\
        \ de a începe sesiunile\n- \U0001F6B6 Folosește pauzele pentru mișcare fizică\
        \ și reset mental\n"
      title: Sesiuni de Muncă Focalizate & Ghid de Gestionare a Timpului
      tooltip: Tooltip ajutor Maraton
    label: Mod Maraton
