  help:
    details:
      content:
        "Опануйте управління завданнями та максимізуйте продуктивність шляхом
        організації, встановлення пріоритетів та ефективного відстеження своєї роботи.


        ## ⚡ Чому це важливо?


        Ефективне управління завданнями - це основа продуктивності. Правильно структуровані
        завдання з чіткими пріоритетами та дедлайнами допомагають зосередитися на
        найважливішому та запобігають втраті важливої роботи.


        ## 📝 Організація завдань


        Структуруйте свої завдання з детальною інформацією для збереження ясності
        та фокусу. Використовуйте теги, пріоритети та оцінки часу для створення систематичного
        підходу до робочого навантаження.


        - 🏷️ Категоризуйте завдання за допомогою значущих тегів

        - ⚖️ Встановлюйте пріоритети, використовуючи перевірені фреймворки

        - ⏱️ Точно оцінюйте часові вимоги

        - 📅 Плануйте реалістичні дедлайни та розклади


        ## ⏰ Управління часом


        Відстежуйте свої часові інвестиції, щоб зрозуміти робочі шаблони та покращити
        ефективність. Правильне управління часом перетворює розпорошені зусилля на
        сфокусовану продуктивність.


        - 📊 Моніторте фактичний проти орієнтовного часу

        - 🎯 Зосереджуйтеся на діяльності з високим впливом

        - 📈 Аналізуйте шаблони продуктивності з часом

        - ⏳ Балансуйте термінові та важливі завдання


        ## 📊 Фреймворк пріоритетів (Матриця Ейзенхауера)


        Організуйте свої завдання, використовуючи цей перевірений метод пріоритизації,
        щоб забезпечити, що ви завжди працюєте над правильними речами в правильний
        час.


        - 🔥 **Термінові та важливі:** Обробляйте негайно - управління кризами та дедлайни

        - 📈 **Важливі, не термінові:** Плануйте стратегічно - планування та розвиток
        навичок

        - ⚡ **Термінові, не важливі:** Делегуйте, коли можливо - переривання та деякі
        зустрічі

        - 🗑️ **Ні термінові, ні важливі:** Усувайте - марнування часу та діяльність
        низької цінності

        "
      title: Посібник з управління завданнями та продуктивності
    overview:
      content:
        "Трансформуйте свою продуктивність за допомогою систематичного управління
        завданнями, яке допомагає залишатися організованим, сфокусованим та контролювати
        робоче навантаження.


        ## ⚡ Чому це важливо?


        Ефективне управління завданнями - це наріжний камінь особистого та професійного
        успіху. Систематично організовуючи свою роботу, ви зменшуєте стрес, послідовно
        дотримуєтеся дедлайнів та створюєте простір для значущого прогресу в важливих
        цілях.


        ## 📋 Організація завдань


        Створіть структурований підхід до управління своїми обов'язками. Добре організовані
        завдання ведуть до чітких пріоритетів та ефективного виконання щоденної роботи.


        - ✅ Створюйте та категоризуйте завдання систематично

        - 🏷️ Групуйте пов'язану роботу за допомогою значущих тегів

        - ⚖️ Встановлюйте чіткі пріоритети та дедлайни

        - 🔍 Використовуйте фільтри та пошук для швидкого доступу


        ## ⏱️ Відстеження часу та фокус


        Моніторте свої часові інвестиції, щоб зрозуміти шаблони продуктивності та
        оптимізувати робочий процес. Усвідомлення часу веде до кращого планування
        та покращення продуктивності.


        - ⏰ Відстежуйте фактичний час, витрачений на завдання

        - 🎯 Використовуйте режим марафону для сфокусованих робочих сесій

        - 📊 Аналізуйте шаблони завершення та тренди

        - 🔄 Регулярно переглядайте та коригуйте оцінки часу


        ## 📈 Моніторинг прогресу


        Відстежуйте свої досягнення та вчіться з робочих шаблонів. Регулярний огляд
        та рефлексія стимулюють постійне вдосконалення системи продуктивності.


        - 📈 Моніторте показники завершення завдань

        - 📅 Переглядайте щоденний та тижневий прогрес

        - 🎯 Ідентифікуйте вузькі місця та можливості оптимізації

        - 🏆 Святкуйте досягнення та завершення віх

        "
      title: Посібник з управління завданнями та робочого процесу
  marathon:
    details:
      title: Деталі завдання
    help:
      content:
        "Максимізуйте свій фокус та продуктивність за допомогою структурованих
        робочих сесій, які допомагають підтримувати глибоку концентрацію, запобігаючи
        вигоранню.


        ## ⚡ Чому це важливо?


        Сфокусовані робочі сесії є необхідними для глибокої роботи та високоякісних
        результатів. Працюючи в структурованих інтервалах з регулярними перервами,
        ви підтримуєте пікову розумову продуктивність, уникаючи втоми, яка виникає
        від тривалих, несфокусованих робочих періодів.


        ## ⏰ Обмежені в часі сесії фокусу


        Використовуйте перевірені техніки управління часом для структурування роботи
        для максимальної ефективності. Структуровані сесії допомагають підтримувати
        концентрацію та ефективніше завершувати завдання.


        - 🎯 **Класичний фокус:** 25 хвилин роботи / 5 хвилин перерви

        - 📈 **Розширений фокус:** 50 хвилин роботи / 10 хвилин перерви

        - 🔄 **Довга перерва:** 15-30 хвилин після 4 сесій

        - ⚖️ **Користувацький час:** Налаштуйте інтервали відповідно до свого природного
        ритму


        ## 🧠 Когнітивні переваги


        Структуровані робочі сесії використовують природні цикли уваги мозку для оптимізації
        продуктивності та запобігання розумовій втомі, яка знижує якість та креативність.


        - 🎯 Посилений фокус та глибока концентрація

        - 🔋 Зменшена розумова втома та вигорання

        - 💪 Підтримана мотивація через регулярні досягнення

        - ⚡ Покращена усвідомленість часу та точність планування


        ## 📊 Оптимізація продуктивності


        Відстежуйте свої шаблони сфокусованої роботи, щоб зрозуміти пікові часи продуктивності
        та оптимізувати розклад для максимальної ефективності.


        - 🏷️ Категоризуйте сесії фокусу тегами для аналізу

        - 📈 Моніторте шаблони продуктивності в різний час

        - 🚫 Усувайте відволікання перед початком сесій

        - 🚶 Використовуйте перерви для фізичного руху та розумового скидання

        "
