  help:
    details:
      content:
        "Bemästra din uppgiftshantering och maximera produktiviteten genom\
        \ att organisera, prioritera och spåra ditt arbete effektivt.\n\n## ⚡ Varför\
        \ Är Det Viktigt?\n\nEffektiv uppgiftshantering är grunden för produktivitet.\
        \ Rätt strukturerade uppgifter med tydliga prioriteringar och deadlines hjälper\
        \ dig fokusera på det som är viktigast och förhindrar att viktigt arbete faller\
        \ mellan stolarna.\n\n## \U0001F4DD Uppgiftsorganisation\n\nStrukturera dina\
        \ uppgifter med omfattande detaljer för att behålla klarhet och fokus. Använd\
        \ taggar, prioriteringar och tidsuppskattningar för att skapa en systematisk\
        \ approach till din arbetsbelastning.\n\n- \U0001F3F7️ Kategorisera uppgifter\
        \ med meningsfulla taggar\n- ⚖️ Sätt prioriteringar med beprövade ramverk\n\
        - ⏱️ Uppskatta tidsbehov korrekt\n- \U0001F4C5 Planera realistiska deadlines\
        \ och scheman\n\n## ⏰ Tidsstyrning\n\nSpåra dina tidsinvesteringar för att\
        \ förstå dina arbetsmönster och förbättra effektivitet. Rätt tidsstyrning\
        \ förvandlar splittrade ansträngningar till fokuserad produktivitet.\n\n-\
        \ \U0001F4CA Övervaka faktisk vs uppskattad tid\n- \U0001F3AF Fokusera på\
        \ högimpact-aktiviteter\n- \U0001F4C8 Analysera produktivitetsmönster över\
        \ tid\n- ⏳ Balansera brådskande och viktiga uppgifter\n\n## \U0001F4CA Prioriteringsramverk\
        \ (Eisenhower Matris)\n\nOrganisera dina uppgifter med denna beprövade prioriteringsmetod\
        \ för att säkerställa att du alltid arbetar med rätt saker vid rätt tid.\n\
        \n- \U0001F525 **Brådskande & Viktigt:** Hantera omedelbart - krishantering\
        \ och deadlines\n- \U0001F4C8 **Viktigt, Inte Brådskande:** Schemalägg strategiskt\
        \ - planering och färdighetsutveckling  \n- ⚡ **Brådskande, Inte Viktigt:**\
        \ Delegera när möjligt - avbrott och vissa möten\n- \U0001F5D1️ **Varken Brådskande\
        \ eller Viktigt:** Eliminera - tidstjuvar och låg-värde aktiviteter\n"
      title: Uppgiftshantering & Produktivitetsguide
    overview:
      content:
        "Transformera din produktivitet med systematisk uppgiftshantering som
        hjälper dig hålla dig organiserad, fokuserad och i kontroll över din arbetsbelastning.


        ## ⚡ Varför Är Det Viktigt?


        Effektiv uppgiftshantering är hörnstenen i personlig och professionell framgång.
        Genom att organisera ditt arbete systematiskt minskar du stress, håller deadlines
        och skapar utrymme för meningsfull framsteg på viktiga mål.


        ## 📋 Uppgiftsorganisation


        Skapa en strukturerad approach till att hantera dina ansvar. Välorganiserade
        uppgifter leder till tydliga prioriteringar och effektiv utförande av ditt
        dagliga arbete.


        - ✅ Skapa och kategorisera uppgifter systematiskt

        - 🏷️ Gruppera relaterat arbete med meningsfulla taggar

        - ⚖️ Sätt tydliga prioriteringar och deadlines

        - 🔍 Använd filter och sökning för snabb åtkomst


        ## ⏱️ Tidsspårning & Fokus


        Övervaka dina tidsinvesteringar för att förstå produktivitetsmönster och optimera
        ditt arbetsflöde. Tidsmedvetenhet leder till bättre planering och förbättrad
        prestanda.


        - ⏰ Spåra faktisk tid per uppgift

        - 🎯 Använd Marathon-läge för fokuserade arbetsessioner

        - 📊 Analysera slutförandemönster och trender

        - 🔄 Granska och justera tidsuppskattningar regelbundet


        ## 📈 Framstegspårning


        Håll koll på dina prestationer och lär av dina arbetsmönster. Regelbunden
        granskning och reflektion driver kontinuerlig förbättring i ditt produktivitetssystem.


        - 📈 Övervaka uppgiftsslutförandefrekvenser

        - 📅 Granska daglig och veckovis framsteg

        - 🎯 Identifiera flaskhalsar och optimiseringsmöjligheter

        - 🏆 Fira prestationer och milstolpar

        "
      title: Uppgiftshantering & Arbetsflödesguide
  marathon:
    details:
      title: Uppgiftsdetaljer
    help:
      content:
        "Maximera ditt fokus och produktivitet med strukturerade arbetsessioner\
        \ som hjälper dig behålla djup koncentration medan du förhindrar utbrändhet.\n\
        \n## ⚡ Varför Är Det Viktigt?\n\nFokuserade arbetsessioner är essentiella\
        \ för djupt arbete och högkvalitativ output. Genom att arbeta i strukturerade\
        \ intervaller med regelbundna pauser upprätthåller du topp mental prestanda\
        \ medan du undviker trötthet från förlängda, ofokuserade arbetsperioder.\n\
        \n## ⏰ Tidsbegränsade Fokussessioner\n\nAnvänd beprövade tidsstyrningstekniker\
        \ för att strukturera ditt arbete för maximal effektivitet. Strukturerade\
        \ sessioner hjälper dig behålla koncentration och slutföra uppgifter mer effektivt.\n\
        \n- \U0001F3AF **Klassisk Fokus:** 25 minuter arbete / 5 minuter paus\n- \U0001F4C8\
        \ **Utökad Fokus:** 50 minuter arbete / 10 minuter paus  \n- \U0001F504 **Lång\
        \ Paus:** 15-30 minuter efter 4 sessioner\n- ⚖️ **Anpassad Timing:** Justera\
        \ intervaller för att matcha din naturliga rytm\n\n## \U0001F9E0 Kognitiva\
        \ Fördelar\n\nStrukturerade arbetsessioner utnyttjar hjärnans naturliga uppmärksamhetscykler\
        \ för att optimera prestanda och förhindra mental trötthet som minskar kvalitet\
        \ och kreativitet.\n\n- \U0001F3AF Förbättrad fokus och djup koncentration\n\
        - \U0001F50B Minskad mental trötthet och utbrändhet\n- \U0001F4AA Hållbar\
        \ motivation genom regelbundna prestationer\n- ⚡ Förbättrad tidsmedvetenhet\
        \ och planeringsnoggrannhet\n\n## \U0001F4CA Prestandaoptimering\n\nSpåra\
        \ dina fokuserade arbetsmönster för att förstå dina topp produktivitetstider\
        \ och optimera ditt schema för maximal effektivitet.\n\n- \U0001F3F7️ Kategorisera\
        \ fokussessioner med taggar för analys\n- \U0001F4C8 Övervaka produktivitetsmönster\
        \ över olika tider\n- \U0001F6AB Eliminera distraktioner innan sessioner startas\n\
        - \U0001F6B6 Använd pauser för fysisk rörelse och mental omstart\n"
      title: Fokuserade Arbetsessioner & Tidsstyrningsguide
      tooltip: Marathon hjälp tooltip
    label: Marathon Läge
    unpin_task_tooltip: Ta bort pinnad nuvarande uppgift
