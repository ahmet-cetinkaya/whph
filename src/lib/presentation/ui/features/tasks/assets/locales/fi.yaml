  help:
    details:
      content:
        "Hallitse tehtäviäsi ja maksimoi tuottavuutesi järjestämällä, priorisoimalla\
        \ ja seuraamalla työtäsi tehokkaasti.\n\n## ⚡ Miksi Se On Tärkeää?\n\nTehokas\
        \ tehtävänhallinta on tuottavuuden perusta. Oikein strukturoidut tehtävät\
        \ selkeillä prioriteeteilla ja määräajoilla auttavat keskittymään siihen,\
        \ mikä on tärkeintä, ja estävät tärkeän työn putoamasta läpi.\n\n## \U0001F4DD\
        \ Tehtävänhallinta\n\nRakenna tehtäviisi kattavat tiedot selkeyden ja fokuksen\
        \ ylläpitämiseksi. Käytä tunnisteita, prioriteetteja ja aikahintoja luodaksesi\
        \ systemaattisen lähestymistavan työkuormaan.\n\n- \U0001F3F7️ Kategorisoi\
        \ tehtävät merkityksellisillä tunnisteilla\n- ⚖️ Aseta prioriteetteja käyttäen\
        \ todistettuja kehyksiä\n- ⏱️ Arvioi aikavaatimukset tarkasti\n- \U0001F4C5\
        \ Suunnittele realistisia määräaikoja ja aikatauluja\n\n## ⏰ Aikanhallinta\n\
        \nSeuraa aikainvestointeja ymmärtääksesi työmallejasi ja parantaaksesi tehokkuutta.\
        \ Oikea aikanhallinta muuttaa hajautetut ponnistelut keskittyneeksi tuottavuudeksi.\n\
        \n- \U0001F4CA Seuraa todellista vs arvioitua aikaa\n- \U0001F3AF Keskity\
        \ korkean vaikutuksen aktiviteetteihin\n- \U0001F4C8 Analysoi tuottavuusmalleja\
        \ ajan myötä\n- ⏳ Tasapainota kiireelliset ja tärkeät tehtävät\n\n## \U0001F4CA\
        \ Prioriteettikehys (Eisenhowerin Matriisi)\n\nJärjestä tehtäväsi käyttäen\
        \ tätä todistettua priorisointimenetelmää varmistaaksesi että työskentelet\
        \ aina oikeissa asioissa oikeaan aikaan.\n\n- \U0001F525 **Kiireellinen &\
        \ Tärkeä:** Käsittele välittömästi - kriisinhallinta ja määräajat\n- \U0001F4C8\
        \ **Tärkeä, Ei Kiireellinen:** Aikatauluta strategisesti - suunnittelu ja\
        \ taitojen kehittäminen  \n- ⚡ **Kiireellinen, Ei Tärkeä:** Delegoi kun mahdollista\
        \ - keskeytykset ja jotkut kokoukset\n- \U0001F5D1️ **Ei Kiireellinen tai\
        \ Tärkeä:** Poista - aikahukkaajat ja matalan arvon aktiviteetit\n"
      title: Tehtävänhallinta & Tuottavuusopas
    overview:
      content:
        "Muuta tuottavuutesi systemaattisella tehtävänhallinnalla joka auttaa
        pysymään järjestettynä, keskittyneenä ja työkuorman hallinnassa.


        ## ⚡ Miksi Se On Tärkeää?


        Tehokas tehtävänhallinta on henkilökohtaisen ja ammatillisen menestyksen kulmakivi.
        Järjestämällä työsi systemaattisesti vähennät stressiä, pidät määräajat ja
        luot tilaa merkittävälle edistymiselle tärkeissä tavoitteissa.


        ## 📋 Tehtävänhallinta


        Luo strukturoitu lähestymistapa vastuiden hallintaan. Hyvin järjestetyt tehtävät
        johtavat selkeisiin prioriteetteihin ja tehokkaaseen päivittäisen työn suorittamiseen.


        - ✅ Luo ja kategorisoi tehtäviä systemaattisesti

        - 🏷️ Ryhmittele liittyvää työtä merkityksellisillä tunnisteilla

        - ⚖️ Aseta selkeät prioriteetit ja määräajat

        - 🔍 Käytä suodattimia ja hakua nopeaan pääsyyn


        ## ⏱️ Aikaseuranta & Fokus


        Seuraa aikainvestointeja ymmärtääksesi tuottavuusmalleja ja optimoidaksesi
        työvirtaasi. Aikawareness johtaa parempaan suunnitteluun ja parannettuun suorituskykyyn.


        - ⏰ Seuraa todellista aikaa per tehtävä

        - 🎯 Käytä Maraton-tilaa keskittyneille työistunnoille

        - 📊 Analysoi valmistumismalleja ja trendejä

        - 🔄 Tarkista ja säädä aikahintoja säännöllisesti


        ## 📈 Edistymisen Seuranta


        Pidä kirjaa saavutuksistasi ja opi työmalleistasi. Säännöllinen tarkistus
        ja heijastus ajavat jatkuvaa parannusta tuottavuusjärjestelmässäsi.


        - 📈 Seuraa tehtävävalmistumisprosentteja

        - 📅 Tarkista päivittäistä ja viikoittaista edistymistä

        - 🎯 Tunnista pullonkaulat ja optimointimahdollisuudet

        - 🏆 Juhli saavutuksia ja virstanpylväiden valmistumisia

        "
      title: Tehtävänhallinta & Työvirtaopas
  marathon:
    details:
      title: Tehtävän Tiedot
    help:
      content:
        "Maksimoi fokuksesi ja tuottavuutesi strukturoiduilla työistunnoilla\
        \ jotka auttavat ylläpitämään syvää keskittymistä estäen burnoutin.\n\n##\
        \ ⚡ Miksi Se On Tärkeää?\n\nKeskittyneet työistunnot ovat olennaisia syvään\
        \ työhön ja korkealaatuiseen tuotokseen. Työskentelemällä strukturoiduissa\
        \ intervaleissa säännöllisillä tauoilla ylläpidät huippupsyykkistä suorituskykyä\
        \ välttäen väsymyksen pitkistä, epäkeskittyneistä työjaksoista.\n\n## ⏰ Aikaraajatut\
        \ Fokusistunnot\n\nKäytä todistettuja aikanhallintatekniikoita strukturoidaksesi\
        \ työsi maksimaaliseen tehokkuuteen. Strukturoidut istunnot auttavat ylläpitämään\
        \ keskittymistä ja suorittamaan tehtäviä tehokkaammin.\n\n- \U0001F3AF **Klassinen\
        \ Fokus:** 25 minuuttia työtä / 5 minuuttia tauko\n- \U0001F4C8 **Laajennettu\
        \ Fokus:** 50 minuuttia työtä / 10 minuuttia tauko  \n- \U0001F504 **Pitkä\
        \ Tauko:** 15-30 minuuttia 4 istunnon jälkeen\n- ⚖️ **Mukautettu Ajoitus:**\
        \ Säädä intervallit vastaamaan luonnollista rytmiäsi\n\n## \U0001F9E0 Kognitiiviset\
        \ Edut\n\nStrukturoidut työistunnot hyödyntävät aivojesi luonnollisia huomiokykyjä\
        \ optimoidakseen suorituskyvyn ja estääkseen psyykkisen väsymyksen joka vähentää\
        \ laatua ja luovuutta.\n\n- \U0001F3AF Parannettu fokus ja syvä keskittyminen\n\
        - \U0001F50B Vähentynyt psyykkinen väsymys ja burnout\n- \U0001F4AA Kestävä\
        \ motivaatio säännöllisten saavutusten kautta\n- ⚡ Parannettu aikawareness\
        \ ja suunnittelutarkkuus\n\n## \U0001F4CA Suorituskyvyn Optimointi\n\nSeuraa\
        \ keskittyneitä työmalliasi ymmärtääksesi huipputuottavuusaikasi ja optimoidaksesi\
        \ aikataulusi maksimaaliseen tehokkuuteen.\n\n- \U0001F3F7️ Kategorisoi fokusistunnot\
        \ tunnisteilla analyysia varten\n- \U0001F4C8 Seuraa tuottavuusmalleja eri\
        \ aikoina\n- \U0001F6AB Poista häiriöt ennen istuntojen aloittamista\n- \U0001F6B6\
        \ Käytä taukoja fyysiseen liikkeeseen ja psyykkiseen resetointiin\n"
      title: Keskittyneet Työistunnot & Aikanhallintaopas
      tooltip: Marathonin apuväline
    label: Maraton-tila
    unpin_task_tooltip: Poista pinnattuna nykyinen tehtävä
