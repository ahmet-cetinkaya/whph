      - **Kolumna 1**: Tytuł (Wymagane)

      - **Kolumna 2**: Opis (Opcjonalne)

      - **Kolumna 3**: Priorytet (0-3, Opcjonalne)

      - **Kolumna 4**: Planowana data (YYYY-MM-DD, Opcjonalne)

      - **Kolumna 5**: Termin końcowy (YYYY-MM-DD, Opcjonalne)

      - **Kolumna 6**: Tagi (Opcjonalne, oddzielone przecinkami)

      Uwaga: Pierwszy wiersz jest traktowany jako nagłówek i zostanie pominięty."
