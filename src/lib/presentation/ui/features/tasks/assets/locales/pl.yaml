    todoist_info_description: "Eksportuj swój projekt jako plik CSV:



      1. Zaloguj się do Todoist na https://todoist.com


      2. Otwórz istniejący projekt


      3. Kliknij ikonę trzech kropek w prawym górnym rogu


      4. Wybierz **Eksportuj jako CSV**"
