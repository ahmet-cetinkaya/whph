  help:
    content:
      "🏷️ Etiketler, öğeleri gruplandırmanıza ve organize etmenize yardımcı
      olur.


      ## ⚡ Özellikler

      - Öğeleri kategorilere ayırın

      - Renklerle görsel düzen oluşturun

      - İlgili öğeleri kolayca bulun


      ## 💡 İpuçları

      - Net ve anlaşılır isimler kullanın

      - Benzer öğeleri aynı etiketle gruplandırın

      - Renk kodlaması ile görsel düzen sağlayın

      - Arşivleme özelliği ile düzeni koruyun

      "
    description:
      Etiketler, öğeleri kategorize etmenize ve gruplandırmanıza yardımcı
      olur
    overview:
      content:
        "Stratejik etiketleme ile üretkenliğinizi dönüştürün, işinizi organize
        etmenize, zaman yatırımlarını takip etmenize ve en önemli şeylere odaklanmanıza
        yardımcı olur.


        ## ⚡ Neden Önemli?


        Etiket tabanlı organizasyon, etkili zaman yönetimi ve üretkenliğin temelidir.
        Anlamlı etiketlerle aktivitelerinizi kategorize ederek, zamanınızı nasıl harcadığınıza
        dair net bir anlayış elde edebilir ve odak ve verimliliğinizi optimize etmek
        için bilgilendirilmiş kararlar alabilirsiniz.


        ## 🏷️ Etiket Tipleri: Kendi Yolunuzla Organize Edin


        Etiketler, her biri belirli organizasyon ihtiyaçları için tasarlanmış üç uzmanlık
        türünde gelir:


        ### 📌 Etiket Etiketleri

        Genel organizasyon için esnek kategorize etiketleri. Konuya, önceliğe, duruma
        veya sizin için çalışan herhangi bir özel sınıflandırma sistemine göre içerikleri
        işaretlemek için kullanın.


        - **Kullanım durumları:** Kategoriler, öncelikler, durumlar, beceriler, alanlar

        - **Örnekler:** #urgent, #backend, #learning, #code-review, #bug

        - **En iyi için:** Tüm içerik türlerinde genel kategorize etme ve filtreleme


        ### 📍 Bağlam Etiketleri

        Görevleri nerede veya nasıl yapabileceğinizi tanımlar. Bağlam etiketleri,
        çalışmanızı mevcut durumunuza, enerji seviyenize veya ortamınıza uyarlamanıza
        yardımcı olur.


        - **Kullanım durumları:** Fiziksel konumlar, enerji seviyeleri, mevcut araçlar,
        çalışma modları

        - **Örnekler:** @home, @work, @computer, @phone, @high-energy, @deep-work

        - **En iyi için:** Konum tabanlı görev filtreleme ve enerji yönetimi


        ### 🎯 Proje Etiketleri

        Paylaşılan hedeflere veya sonuçlara doğru ilgili görevleri gruplandırır. Proje
        etiketleri, belirli hedeflere katkıda çalışan doğal iş paketleri oluşturur.


        - **Kullanım durumları:** Ürün lansmanları, özellik geliştirme, kişisel hedefler,
        tekrarlayan girişimler

        - **Örnekler:** +WebsiteRedesign, +MobileApp, +Q1Planning, +FitnessChallenge

        - **En iyi için:** Belirli kilometre taşlarına ve teslimatlara doğru ilerlemeyi
        takip etme


        ## 📊 Zaman Yatırımı Analizi

        Zamanınızın nereye gittiğini anlayın ve öncelikleriniz hakkında veriye dayalı
        kararlar alın. Etiketlerle zaman takibi, programınızı ve çalışma alışkanlıklarınızı
        optimize etmenize yardımcı olan desenleri ortaya çıkarır.


        - ⏱️ Farklı aktivite kategorilerinde harcanan zamanı izleyin

        - 📅 Belirli dönemler ve trendler üzerinde zaman yatırımlarını takip edin

        - ⚖️ Projeler ve sorumluluklar arasında zaman tahsisini karşılaştırın

        - 📈 Üretkenlik desenlerini ve tepe performans zamanlarını belirleyin

        - 🎯 Enerjinizi yüksek etkili aktivitelere odaklayın


        ## 🗂️ Stratejik Organizasyon

        İhtiyaçlarınızla ölçeklenen çalışmanızı organize etmek için sistem yaklaşımı
        oluşturun. İyi yapılandırılmış etiketler, verimli bir üretkenlik sisteminin
        temelini oluşturur.


        - 🔍 Çoklu etiket aramalarıyla bilgiyi hızla filtreleyin ve bulun

        - 🗄️ Temiz organizasyonu sürdürmek için tamamlanan projeleri arşivleyin

        - 🧩 Çalışma desenlerinizi yansıtan hiyerarşik yapılar oluşturun

        - 👥 Daha iyi proje yönetimi için ilgili aktiviteleri gruplandırın

        - ⏳ Tüm aktivitelerde kapsamlı zaman takibini etkinleştirin


        ## 💡 Optimizasyon Stratejileri


        Organizasyon sisteminizin etkinliğini en üst düzeye çıkarmak ve uzun vadeli
        üretkenlik büyümesini sürdürmek için gelişmiş etiketleme tekniklerinden yararlanın.


        - 🏷️ Zamanla anlamlı kalan net, açıklayıcı adlar kullanın

        - 🔗 **Hiyerarşik yapılar oluşturun:** Projeler → Departmanlar → Alanlar

        - 📊 İyileştirme fırsatlarını belirlemek için düzenli olarak zaman analizi
        raporlarını inceleyin

        - 🗄️ Tamamlanan çalışmaları arşivleyerek sistem temizliğini sürdürün

        - 🎯 Dikkati dağıtıcıları ortadan kaldırmak ve konsantrasyonu artırmak için
        hedefli filtreleme uygulayın

        - 🔄 **Stratejik olarak etiket tiplerini birleştirin:** Hedefler için projeleri,
        durum için bağlamları ve kategoriler için etiketleri kullanın"
      title: Etiket Tabanlı Organizasyon ve Zaman Yönetimi Rehberi
    title: Etiket Yardım
