  tour:
    smart_tagging:
      title: Розумна система тегів
      description:
        Використовуйте теги для організації та групування завдань, звичок
        і додатків. Відстежуйте час, витрачений на різні дії за тегами, щоб зрозуміти,
        куди йде ваш час, і оптимізувати робочий процес.
    your_tags:
      title: Ваші теги
      description:
        Перегляньте всі свої теги та перегляньте їхню статистику використання.
        Натисніть на будь-який тег, щоб переглянути деталі, відредагувати властивості
        або побачити, які завдання та звички його використовують. Ефективно організуйте
        свій робочий процес.
    tag_archive_filters:
      title: Фільтри тегів і архіву
      description:
        Фільтруйте теги, вибираючи конкретні теги для фокусування, або
        перемикайте видимість архівованих тегів. Контролюйте, які теги відображаються
        у вашому списку, для кращої організації.
    search_sort:
      title: Пошук і сортування
      description:
        Шукайте конкретні теги за назвою, сортуйте за різними критеріями,
        як-от назва або кількість використань. Організуйте список тегів, щоб швидко
        знайти те, що вам потрібно.
    time_distribution_chart:
      title: Діаграма розподілу часу
      description:
        Візуалізуйте, як ви витрачаєте свій час на різні теги та категорії.
        Перегляньте моделі розподілу часу та визначте, куди спрямована ваша увага
        протягом дня.
    chart_customization:
      title: Налаштування діаграми
      description:
        Налаштуйте часову діаграму, вибравши діапазон дат, категорії (завдання,
        звички, додатки) і фільтруючи за конкретними тегами, щоб детально проаналізувати
        розподіл вашого часу.
    create_tags:
      title: Створити нові теги
      description:
        Додайте нові теги для категоризації вашого вмісту. Теги допомагають
        вам організувати завдання, звички та додатки в усіх функціях для кращого відстеження
        продуктивності та управління часом.
