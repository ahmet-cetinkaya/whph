  tour:
    smart_tagging:
      title: Умная система тегов
      description:
        Используйте теги для организации и группировки задач, привычек
        и приложений. Отслеживайте время, затраченное на различные действия по тегам,
        чтобы понять, куда уходит ваше время, и оптимизировать рабочий процесс.
    your_tags:
      title: Ваши теги
      description:
        Просмотрите все свои теги и посмотрите их статистику использования.
        Нажмите на любой тег, чтобы просмотреть детали, изменить свойства или увидеть,
        какие задачи и привычки его используют. Эффективно организуйте свой рабочий
        процесс.
    tag_archive_filters:
      title: Фильтры тегов и архива
      description:
        Фильтруйте теги, выбирая конкретные теги для фокусировки или переключая
        видимость архивированных тегов. Контролируйте, какие теги отображаются в вашем
        списке, для лучшей организации.
    search_sort:
      title: Поиск и сортировка
      description:
        Ищите конкретные теги по имени, сортируйте по различным критериям,
        таким как имя или количество использований. Организуйте список тегов, чтобы
        быстро находить то, что вам нужно.
    time_distribution_chart:
      title: Диаграмма распределения времени
      description:
        Визуализируйте, как вы проводите время по различным тегам и категориям.
        Смотрите закономерности распределения времени и определяйте, куда направлен
        ваш фокус в течение дня.
    chart_customization:
      title: Настройка диаграммы
      description:
        Настройте временную диаграмму, выбрав диапазон дат, категории (задачи,
        привычки, приложения) и фильтруя по конкретным тегам для детального анализа
        распределения вашего времени.
    create_tags:
      title: Создать новые теги
      description:
        Добавьте новые теги для категоризации вашего контента. Теги помогают
        вам организовать задачи, привычки и приложения во всех функциях для лучшего
        отслеживания продуктивности и управления временем.
