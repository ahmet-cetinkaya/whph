  help:
    content: "🏷️ Теги помогают вам группировать и организовывать элементы.


      ## ⚡ Функции

      - Разделяйте элементы на категории

      - Создавайте визуальный порядок с цветами

      - Легко находите связанные элементы


      ## 💡 Советы

      - Используйте ясные и понятные названия

      - Группируйте похожие элементы с одним тегом

      - Используйте цветовое кодирование для визуального порядка

      - Используйте функцию архивирования для поддержания порядка

      "
    description: Теги помогают вам категоризировать и группировать элементы
    overview:
      content:
        "Трансформируйте свою продуктивность с помощью стратегической маркировки,
        которая помогает организовать работу, отслеживать инвестиции времени и поддерживать
        четкий фокус на том, что имеет наибольшее значение.


        ## ⚡ Почему Это Важно?


        Организация на основе тегов является фундаментом эффективного управления временем
        и продуктивности. Категоризируя свои деятельности значимыми тегами, вы получаете
        четкое понимание того, как вы проводите время, и можете принимать обоснованные
        решения для оптимизации своего фокуса и эффективности.


        ## 🏷️ Типы Тегов: Организуйте По-Своему


        Теги существуют в трех специализированных типах, каждый из которых разработан
        для конкретных организационных потребностей:


        ### 📌 Теги Меток

        Гибкие теги категоризации для общей организации. Используйте их для маркировки
        содержимого по теме, приоритету, статусу или любой пользовательской системе
        классификации, которая работает для вас.


        - **Случаи использования:** Категории, приоритеты, статусы, навыки, области

        - **Примеры:** #urgent, #backend, #learning, #code-review, #bug

        - **Наиболее подходит для:** Общей категоризации и фильтрации по всем типам
        содержимого


        ### 📍 Теги Контекста

        Определяют, где или как вы можете выполнять задачи. Теги контекста помогают
        адаптировать вашу работу к вашей текущей ситуации, уровню энергии или среде.


        - **Случаи использования:** Физические местоположения, уровни энергии, доступные
        инструменты, режимы работы

        - **Примеры:** @home, @work, @computer, @phone, @high-energy, @deep-work

        - **Наиболее подходит для:** Фильтрации задач на основе местоположения и управления
        энергией


        ### 🎯 Теги Проекта

        Группируют связанные задачи в направлении общих целей или результатов. Теги
        проекта создают естественные пакеты работы, которые вносят вклад в конкретные
        цели.


        - **Случаи использования:** Запуски продуктов, разработка функций, личные
        цели, повторяющиеся инициативы

        - **Примеры:** +WebsiteRedesign, +MobileApp, +Q1Planning, +FitnessChallenge

        - **Наиболее подходит для:** Отслеживания прогресса к конкретным вехам и доставкам


        ## 📊 Анализ Инвестиций Времени


        Поймите, куда уходит ваше время, и принимайте решения на основе данных о ваших
        приоритетах. Отслеживание времени с помощью тегов выявляет паттерны, которые
        помогают оптимизировать ваше расписание и рабочие привычки.


        - ⏱️ Отслеживайте время, потраченное на различные категории деятельности

        - 📅 Отслеживайте инвестиции времени за конкретные периоды и тренды

        - ⚖️ Сравнивайте распределение времени между проектами и обязанностями

        - 📈 Выявляйте паттерны продуктивности и времена пиковой производительности

        - 🎯 Фокусируйте свою энергию на высокоэффективных деятельностях


        ## 🗂️ Стратегическая Организация

        Создайте систематический подход к организации вашей работы, который масштабируется
        с вашими потребностями. Хорошо структурированные теги формируют основу эффективной
        системы продуктивности.


        - 🔍 Фильтруйте и находите информацию быстро с помощью multi-tag поисков

        - 🗄️ Архивируйте завершенные проекты для поддержания чистой организации

        - 🧩 Стройте иерархические структуры, отражающие ваши паттерны работы

        - 👥 Группируйте связанные деятельности для лучшего управления проектами

        - ⏳ Включите комплексное отслеживание времени по всем деятельностям


        ## 💡 Стратегии Оптимизации


        Используйте продвинутые техники маркировки для максимизации эффективности
        вашей организационной системы и поддержания долгосрочного роста продуктивности.


        - 🏷️ Используйте четкие, описательные имена, которые остаются значимыми с
        течением времени

        - 🔗 **Создавайте иерархические структуры:** Проекты → Отделы → Области

        - 📊 Регулярно просматривайте отчеты об анализе времени для выявления возможностей
        улучшения

        - 🗄️ Поддерживайте чистоту системы, архивируя завершенную работу

        - 🎯 Применяйте целенаправленную фильтрацию для устранения отвлечений и повышения
        концентрации

        - 🔄 **Стратегически комбинируйте типы тегов:** Используйте проекты для целей,
        контексты для ситуации и метки для категорий"
      title: Руководство по организации на основе тегов и управлению временем
    title: Справка по тегам
