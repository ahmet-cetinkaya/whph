      description:
        Selaa kaikkia tunnisteitasi ja katso niiden käyttötilastoja. Napsauta
        mitä tahansa tunnistetta nähdäksesi tiedot, muokataksesi ominaisuuksia tai
        nähdäksesi, mitkä tehtävät ja tavat käyttävät sitä. Järjestä työnkulku tehokkaasti.
