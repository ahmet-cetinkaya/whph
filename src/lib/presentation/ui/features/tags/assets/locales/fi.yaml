      description:
        Visualisoi, miten käytät aikaasi eri tunnisteisiin ja luokkiin.
        Katso ajanjakautumismalleja ja tunnista, mihin huomiosi kohdistuu päivän aikana.
    chart_customization:
      title: Kaavion Mukauttaminen
      description:
        Mukauta aikakaaviota valitsemalla ajanjakso, valitsemalla luokat
        (tehtävät, tavat, sovellukset) ja suodattamalla tietyillä tunnisteilla analysoidaksesi
        aikajakaumaa yksityiskohtaisesti.
    create_tags:
      title: Luo Uusia Tunnisteita
      description:
        Lisää uusia tunnisteita sisältösi luokittelemiseksi. Tunnisteet
        auttavat sinua järjestämään tehtäviä, tapoja ja sovelluksia kaikissa ominaisuuksissa
        parempaa tuottavuuden seurantaa ja ajanhallintaa varten.
