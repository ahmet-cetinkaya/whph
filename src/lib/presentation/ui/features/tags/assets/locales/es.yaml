  help:
    content: "🏷️ Las etiquetas te ayudan a agrupar y organizar elementos.


      ## ⚡ Características

      - Divide elementos en categorías

      - Crea orden visual con colores

      - Encuentra fácilmente elementos relacionados


      ## 💡 Consejos

      - Usa nombres claros y comprensibles

      - Agrupa elementos similares con la misma etiqueta

      - Usa codificación de colores para orden visual

      - Usa la función de archivo para mantener el orden

      "
    description: Las etiquetas te ayudan a categorizar y agrupar elementos
    overview:
      content:
        "Transforme su productividad con etiquetado estratégico que le ayuda
        a organizar el trabajo, rastrear inversiones de tiempo y mantener un enfoque
        claro en lo que más importa.


        ## ⚡ ¿Por Qué Es Importante?


        La organización basada en etiquetas es fundamental para la gestión efectiva
        del tiempo y la productividad. Al categorizar sus actividades con etiquetas
        significativas, obtiene información clara sobre cómo pasa su tiempo y puede
        tomar decisiones informadas para optimizar su enfoque y eficiencia.


        ## 🏷️ Tipos de Etiquetas: Organice a Su Manera


        Las etiquetas vienen en tres tipos especializados, cada uno diseñado para
        necesidades organizacionales específicas:


        ### 📌 Etiquetas de Rótulo

        Etiquetas de categorización flexible para organización general. Úselas para
        marcar contenido por tema, prioridad, estado o cualquier sistema de clasificación
        personalizado que funcione para usted.


        - **Casos de uso:** Categorías, prioridades, estados, habilidades, dominios

        - **Ejemplos:** #urgent, #backend, #learning, #code-review, #bug

        - **Mejor para:** Categorización general y filtrado en todos los tipos de
        contenido


        ### 📍 Etiquetas de Contexto

        Definen dónde o cómo puede cumplir tareas. Las etiquetas de contexto le ayudan
        a adaptar su trabajo a su situación actual, nivel de energía o entorno.


        - **Casos de uso:** Ubicaciones físicas, niveles de energía, herramientas
        disponibles, modos de trabajo

        - **Ejemplos:** @home, @work, @computer, @phone, @high-energy, @deep-work

        - **Mejor para:** Filtrado de tareas basado en ubicación y gestión de energía


        ### 🎯 Etiquetas de Proyecto

        Agrupan tareas relacionadas hacia objetivos o resultados compartidos. Las
        etiquetas de proyecto crean paquetes naturales de trabajo que contribuyen
        a objetivos específicos.


        - **Casos de uso:** Lanzamientos de productos, desarrollo de características,
        metas personales, iniciativas recurrentes

        - **Ejemplos:** +WebsiteRedesign, +MobileApp, +Q1Planning, +FitnessChallenge

        - **Mejor para:** Seguir el progreso hacia hitos y entregas específicas


        ## 📊 Análisis de Inversión de Tiempo


        Entienda a dónde va su tiempo y tome decisiones basadas en datos sobre sus
        prioridades. El seguimiento del tiempo con etiquetas revela patrones que le
        ayudan a optimizar su horario y hábitos de trabajo.


        - ⏱️ Monitoree el tiempo gastado en diferentes categorías de actividades

        - 📅 Rastree inversiones de tiempo sobre períodos específicos y tendencias

        - ⚖️ Compare la asignación de tiempo entre proyectos y responsabilidades

        - 📈 Identifique patrones de productividad y tiempos de máximo rendimiento

        - 🎯 Enfoque su energía en actividades de alto impacto


        ## 🗂️ Organización Estratégica


        Cree un enfoque sistemático para organizar su trabajo que escala con sus necesidades.
        Las etiquetas bien estructuradas forman la base de un sistema de productividad
        eficiente.


        - 🔍 Filtre y encuentre información rápidamente con búsquedas multi-etiqueta

        - 🗄️ Archive proyectos completados para mantener una organización limpia

        - 🧩 Construya estructuras jerárquicas que reflejen sus patrones de trabajo

        - 👥 Agrupe actividades relacionadas para mejor gestión de proyectos

        - ⏳ Habilite el seguimiento comprehensivo del tiempo en todas las actividades


        ## 💡 Estrategias de Optimización


        Aproveche técnicas de etiquetado avanzadas para maximizar la efectividad de
        su sistema organizacional y mantener el crecimiento de productividad a largo
        plazo.


        - 🏷️ Use nombres claros y descriptivos que permanezcan significativos con
        el tiempo

        - 🔗 **Cree estructuras jerárquicas:** Proyectos → Departamentos → Áreas

        - 📊 Revise informes de análisis de tiempo regularmente para identificar oportunidades
        de mejora

        - 🗄️ Mantenga la limpieza del sistema archivando trabajo completado

        - 🎯 Aplique filtrado enfocado para eliminar distracciones y mejorar la concentración

        - 🔄 **Combine tipos de etiquetas estratégicamente:** Use proyectos para objetivos,
        contextos para situación y rótulos para categorías"
      title: Guía de organización basada en etiquetas y gestión del tiempo
