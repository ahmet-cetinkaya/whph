version: 0.0.1
publish_to: "none"

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  acore:
    path: ../../../packages/acore-flutter
  dart_json_mapper: ^2.2.16
  equatable: ^2.0.7
